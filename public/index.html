<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo applications
    </title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --olive: #6B7A2A;
            --olive-light: #8A9A35;
            --olive-bright: #A8C038;
            --black: #0A0A0A;
            --dark: #111111;
            --dark2: #1A1A1A;
            --dark3: #222222;
            --border: #2A2A2A;
            --text: #E8E8E8;
            --text-dim: #888888;
        }

        body {
            font-family: 'JetBrains Mono', monospace;
            background: var(--black);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container { width: 100%; max-width: 560px; }

        .header {
            border: 1px solid var(--olive);
            background: var(--dark);
            padding: 1.5rem 2rem;
            margin-bottom: 2px;
            position: relative;
        }

        .header::before {
            content: '> TASK_MANAGER_v1.2';
            position: absolute;
            top: -10px;
            left: 16px;
            background: var(--black);
            color: var(--olive-bright);
            font-size: 0.7rem;
            padding: 0 8px;
            letter-spacing: 2px;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.2rem;
        }

        .title {
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--olive-bright);
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: var(--olive-bright);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--olive-bright);
            animation: pulse 2s infinite;
        }

        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        .stats-bar {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1px;
            background: var(--border);
            border: 1px solid var(--border);
        }

        .stat { background: var(--dark2); padding: 10px; text-align: center; }
        .stat-number { font-size: 1.4rem; font-weight: 700; color: var(--olive-bright); }
        .stat-label { font-size: 0.65rem; color: var(--text-dim); letter-spacing: 2px; text-transform: uppercase; margin-top: 2px; }

        .input-section {
            border: 1px solid var(--olive);
            border-top: none;
            background: var(--dark);
            padding: 1.2rem 2rem;
            margin-bottom: 2px;
        }

        .input-label { font-size: 0.65rem; color: var(--olive); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 8px; }

        .input-area { display: flex; }

        input[type="text"] {
            flex: 1;
            padding: 12px 16px;
            background: var(--dark2);
            border: 1px solid var(--border);
            border-right: none;
            color: var(--text);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            outline: none;
            transition: 0.2s;
        }

        input[type="text"]:focus { border-color: var(--olive); background: var(--dark3); }
        input[type="text"]::placeholder { color: var(--text-dim); font-size: 0.8rem; }

        .add-btn {
            padding: 12px 20px;
            background: var(--olive);
            border: 1px solid var(--olive);
            color: var(--black);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: 1px;
            transition: 0.2s;
            text-transform: uppercase;
        }

        .add-btn:hover { background: var(--olive-bright); border-color: var(--olive-bright); }

        .filter-section {
            border: 1px solid var(--olive);
            border-top: none;
            background: var(--dark);
            padding: 0.8rem 2rem;
            display: flex;
            margin-bottom: 2px;
        }

        .tab {
            padding: 6px 16px;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-dim);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            cursor: pointer;
            transition: 0.2s;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-right: 4px;
        }

        .tab:hover { border-color: var(--olive); color: var(--olive-bright); }
        .tab.active { background: var(--olive); border-color: var(--olive); color: var(--black); font-weight: 700; }

        .list-section {
            border: 1px solid var(--olive);
            border-top: none;
            background: var(--dark);
            min-height: 200px;
            max-height: 400px;
            overflow-y: auto;
        }

        .todo-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 2rem;
            border-bottom: 1px solid var(--border);
            transition: 0.2s;
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }

        .todo-item:hover { background: var(--dark2); }
        .todo-item:last-child { border-bottom: none; }
        .todo-item.completed { background: rgba(107, 122, 42, 0.05); }

        .checkbox {
            width: 18px;
            height: 18px;
            border: 1px solid var(--border);
            background: var(--dark2);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
            flex-shrink: 0;
            font-size: 11px;
        }

        .checkbox:hover { border-color: var(--olive); }
        .checkbox.checked { background: var(--olive); border-color: var(--olive); color: var(--black); font-weight: 700; }

        .todo-index { color: var(--olive); font-size: 0.7rem; width: 24px; flex-shrink: 0; }

        .todo-text { flex: 1; font-size: 0.9rem; color: var(--text); cursor: pointer; transition: 0.2s; }
        .todo-text.completed { text-decoration: line-through; color: var(--text-dim); }

        .delete-btn {
            background: transparent;
            border: 1px solid transparent;
            color: var(--border);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            cursor: pointer;
            padding: 4px 8px;
            transition: 0.2s;
        }

        .delete-btn:hover { border-color: #ff4444; color: #ff4444; background: rgba(255,68,68,0.1); }

        .empty-state { padding: 3rem; text-align: center; color: var(--text-dim); }
        .empty-state .icon { font-size: 2rem; margin-bottom: 1rem; opacity: 0.5; }
        .empty-state p { font-size: 0.8rem; letter-spacing: 1px; }

        .footer {
            border: 1px solid var(--olive);
            border-top: 1px solid var(--border);
            background: var(--dark);
            padding: 0.8rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .footer-text { font-size: 0.75rem; color: var(--text-dim); letter-spacing: 1px; }

        .clear-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-dim);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.72rem;
            cursor: pointer;
            padding: 5px 12px;
            transition: 0.2s;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .clear-btn:hover { border-color: #ff4444; color: #ff4444; }

        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-track { background: var(--dark); }
        ::-webkit-scrollbar-thumb { background: var(--olive); }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-top">
                <div class="title">// Todo Gopi</div>
                <div class="status-dot"></div>
            </div>
            <div class="stats-bar">
                <div class="stat">
                    <div class="stat-number" id="totalCount">0</div>
                    <div class="stat-label">Total</div>
                </div>
                <div class="stat">
                    <div class="stat-number" id="activeCount">0</div>
                    <div class="stat-label">Active</div>
                </div>
                <div class="stat">
                    <div class="stat-number" id="doneCount">0</div>
                    <div class="stat-label">Done</div>
                </div>
            </div>
        </div>

        <div class="input-section">
            <div class="input-label">// new task</div>
            <div class="input-area">
                <input type="text" id="todoInput" placeholder="enter task description..." />
                <button class="add-btn" id="addBtn">+ ADD</button>
            </div>
        </div>

        <div class="filter-section">
            <button class="tab active" data-filter="all">ALL</button>
            <button class="tab" data-filter="active">ACTIVE</button>
            <button class="tab" data-filter="completed">DONE</button>
        </div>

        <div class="list-section" id="todoList"></div>

        <div class="footer">
            <span class="footer-text" id="footerText">// 0 items remaining</span>
            <button class="clear-btn" id="clearBtn">CLEAR DONE</button>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'gopi_todos';
        let filter = 'all';

        function load() {
            try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
            catch { return []; }
        }

        function save(todos) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(todos));
        }

        function render() {
            const todos = load();
            const total = todos.length;
            const done = todos.filter(t => t.completed).length;
            const active = total - done;

            document.getElementById('totalCount').textContent = total;
            document.getElementById('activeCount').textContent = active;
            document.getElementById('doneCount').textContent = done;
            document.getElementById('footerText').textContent = `// ${active} item${active !== 1 ? 's' : ''} remaining`;

            let filtered = todos;
            if (filter === 'active') filtered = todos.filter(t => !t.completed);
            if (filter === 'completed') filtered = todos.filter(t => t.completed);

            const list = document.getElementById('todoList');
            if (filtered.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">□</div>
                        <p>// NO TASKS FOUND</p>
                    </div>`;
                return;
            }

            list.innerHTML = filtered.map((todo, i) => `
                <div class="todo-item ${todo.completed ? 'completed' : ''}">
                    <span class="todo-index">${String(i + 1).padStart(2, '0')}.</span>
                    <div class="checkbox ${todo.completed ? 'checked' : ''}" data-toggle="${todo.id}">
                        ${todo.completed ? '✓' : ''}
                    </div>
                    <span class="todo-text ${todo.completed ? 'completed' : ''}" data-toggle="${todo.id}">
                        ${todo.text}
                    </span>
                    <button class="delete-btn" data-delete="${todo.id}">[DEL]</button>
                </div>
            `).join('');
        }

        function addTodo() {
            const input = document.getElementById('todoInput');
            const text = input.value.trim();
            if (!text) return;
            const todos = load();
            todos.push({ id: Date.now(), text, completed: false });
            save(todos);
            input.value = '';
            render();
        }

        document.getElementById('addBtn').addEventListener('click', addTodo);

        document.getElementById('todoInput').addEventListener('keypress', e => {
            if (e.key === 'Enter') addTodo();
        });

        document.getElementById('clearBtn').addEventListener('click', () => {
            save(load().filter(t => !t.completed));
            render();
        });

        document.querySelectorAll('.tab').forEach(btn => {
            btn.addEventListener('click', () => {
                filter = btn.dataset.filter;
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                btn.classList.add('active');
                render();
            });
        });

        document.getElementById('todoList').addEventListener('click', e => {
            const toggleId = e.target.closest('[data-toggle]')?.dataset.toggle;
            const deleteId = e.target.closest('[data-delete]')?.dataset.delete;

            if (toggleId) {
                const todos = load();
                const t = todos.find(t => t.id == toggleId);
                if (t) { t.completed = !t.completed; save(todos); render(); }
            }

            if (deleteId) {
                save(load().filter(t => t.id != deleteId));
                render();
            }
        });

        render();
    </script>
</body>
</html>
