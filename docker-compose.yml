services:

  mongo:
    image: mongo:4.4
    restart: always
    command: mongod --wiredTigerCacheSizeGB 0.25
    volumes:
      - mongo-data:/data/db
    networks:
      - monitoring

  app:
    build: .
    ports:
      - "80:3000"
    environment:
      - MONGO_URL=mongodb://mongo:27017/tododb
    restart: always
    depends_on:
      - mongo
    networks:
      - monitoring

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    restart: always
    networks:
      - monitoring

  grafana:
    image: grafana/grafana:latest
    user: "472"
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_PATHS_PROVISIONING=/etc/grafana/provisioning
    volumes:
      - grafana-data:/var/lib/grafana
    restart: always
    networks:
      - monitoring

  node-exporter:   # ✅ FIXED (same level as others)
    image: prom/node-exporter
    container_name: node-exporter
    ports:
      - "9100:9100"
    networks:
      - monitoring

networks:
  monitoring:
    driver: bridge

volumes:
  mongo-data:
  grafana-data: